<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Cherry</title>
  <script>
    (() => {
      try {
        const mode = localStorage.getItem("cherry-theme-mode") || "system";
        document.documentElement.dataset.theme = ["system", "light", "dark"].includes(mode) ? mode : "system";
      } catch (_) {
        document.documentElement.dataset.theme = "system";
      }
    })();
  </script>
  <script src="./src/app/startup/state.js?v=20260712-6"></script>
  <script type="module" src="./src/app/bootstrap.js?v=20260715-1"></script>
  <link rel="stylesheet" href="./style.css?v=20260628-101" />
  <link rel="stylesheet" href="./src/app/startup/shell.css?v=20260712-7" />
  <link rel="stylesheet" href="./src/app/startup/loading-scene.css?v=20260712-2" />
  <link rel="stylesheet" href="./ux-fix.css?v=20260628-13" />
  <link rel="stylesheet" href="./safety-fix.css?v=20260628-14" />
  <link rel="stylesheet" href="./src/features/list-view/styles.css?v=20260630-1" />
  <link rel="stylesheet" href="./src/features/mobile-ux/styles.css?v=20260630-8" />
  <link rel="stylesheet" href="./src/features/mobile-modal/stabilize.css?v=20260630-1" />
  <link rel="stylesheet" href="./src/features/mobile-action-bar/styles.css?v=20260630-1" />
  <link rel="stylesheet" href="./src/features/same-day-link-style/styles.css?v=20260630-1" />
  <link rel="stylesheet" href="./src/features/mobile-flow-map/styles.css?v=20260703-6" />
  <link rel="stylesheet" href="./src/features/welcome-splash/styles.css?v=20260703-1" />
  <link rel="stylesheet" href="./src/features/storage-choice/focus-fit.css?v=20260712-1" />
  <link rel="stylesheet" href="./visual-cleanup.css?v=20260705-64-theme" />
  <link rel="stylesheet" href="./control-alignment-polish.css?v=20260712-1" />
  <link rel="stylesheet" href="./src/features/task-creation-primary/styles.css?v=20260707-2" />
  <link rel="stylesheet" href="./src/features/connect-existing-tasks/styles.css?v=20260709-1" />
</head>
<body>
  <section id="startupShell" class="startupShell" data-startup-visible="true" role="status" aria-live="polite" aria-labelledby="startupShellTitle">
    <div class="startupShellCard">
      <div class="startupShellBrand">
        <div class="startupShellMark" aria-hidden="true">C</div>
        <div>
          <strong>Cherry</strong>
          <span>Flow first, date second.</span>
        </div>
      </div>
      <p class="startupShellKicker" data-startup-copy="kicker">Cherry を準備しています</p>
      <h1 id="startupShellTitle" data-startup-copy="title">スタート画面を準備しています</h1>
      <p class="startupShellBody" data-startup-copy="body">保存済みの作業と利用できる操作を確認しています。</p>
      <div class="startupShellProgress" aria-hidden="true"></div>
      <button type="button" class="startupShellReload" data-startup-reload hidden>再読み込み</button>
    </div>
  </section>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">C</div>
        <div>
          <h1>Cherry</h1>
          <p>タスクの流れを、ブロックで育てる。</p>
        </div>
      </div>

      <div class="toolbar">
        <button id="addRootBtn">+ タスクを追加</button>
        <button id="treeLayoutBtn">自動整列</button>
        <button id="verticalLayoutBtn">縦整列</button>
        <button id="toggleLanesBtn">日付レーン ON</button>
        <button id="themeToggleBtn" type="button" aria-label="テーマを切り替え">テーマ: 自動</button>
        <button id="undoBtn">戻る</button>
        <button id="deleteBtn" class="danger" disabled>削除</button>
        <button id="resetBtn" class="danger">リセット</button>
      </div>
    </header>

    <main class="stage">
      <div class="stageHeader" aria-hidden="true" style="display: none;">
        <div class="monthCard">
          <div id="monthBig">5</div>
          <div id="monthName">May</div>
        </div>
      </div>

      <div id="board" class="board">
        <svg id="links" class="links"></svg>
        <div id="lanes" class="lanes"></div>
        <div id="dateHud" class="dateHud"></div>
        <div id="notes" class="notes"></div>
        <div id="ghost" class="ghost hidden">新しいタスク</div>
      </div>
    </main>
  </div>

  <div id="taskModal" class="modalBackdrop hidden">
    <div class="modal">
      <h2 id="taskModalTitle">タスクを作成</h2>
      <label>
        タスク名
        <input id="taskNameInput" type="text" placeholder="例：ワーク12ページ" />
      </label>
      <label>
        目標日
        <input id="taskDateInput" type="date" />
      </label>
      <div class="modalActions">
        <button id="taskCancelBtn" class="ghostBtn">キャンセル</button>
        <button id="taskSaveBtn">決定</button>
      </div>
    </div>
  </div>

  <div id="dateModal" class="modalBackdrop hidden">
    <div class="modal smallModal">
      <h2>日付を変更</h2>
      <p class="modalText">区切り線や空白に置かれました。移動先の日付を選んでください。</p>
      <label>
        目標日
        <input id="changeDateInput" type="date" />
      </label>
      <div class="modalActions">
        <button id="dateCancelBtn" class="ghostBtn">戻す</button>
        <button id="dateSaveBtn">変更</button>
      </div>
    </div>
  </div>

  <script src="./legacy-core-bridge.js?v=20260715-1"></script>
  <script src="./storage-adapter.js?v=20260710-1"></script>
  <script src="./work-data-storage.js?v=20260715-1"></script>
  <script src="./src/features/storage-choice/implementation.js?v=20260712-2"></script>
  <script src="./app.js?v=20260628-10"></script>
  <script src="./date-only-utils.js?v=20260703-1"></script>
  <script src="./state-storage.js?v=20260712-3"></script>
  <script src="./ux-fix.js?v=20260628-132"></script>
  <script src="./mobile.js?v=20260628-10"></script>
  <script src="./safety-fix.js?v=20260628-15"></script>
  <script src="./final-fix.js?v=20260628-156"></script>
  <script src="./date-target-fix.js?v=20260704-4"></script>
  <script src="./schedule-model.js?v=20260630-2"></script>
  <script src="./date-modal-target-guard.js?v=20260704-1"></script>
  <script src="./src/features/same-day-layout/implementation.js?v=20260630-2"></script>
  <script src="./src/features/same-day-link-style/implementation.js?v=20260630-1"></script>
  <script src="./src/features/mobile-ux/implementation.js?v=20260630-9"></script>
  <script src="./src/features/list-view/implementation.js?v=20260630-1"></script>
  <script src="./src/features/mobile-action-bar/implementation.js?v=20260707-3"></script>
  <script src="./src/features/drag-edge-scroll/implementation.js?v=20260709-1"></script>
  <script src="./src/features/connect-existing-tasks/implementation.js?v=20260709-1"></script>
  <script src="./src/features/mobile-flow-map/implementation.js?v=20260703-11"></script>
  <script src="./src/features/relationship-layout/implementation.js?v=20260704-2"></script>
  <script src="./src/features/layout-debug/implementation.js?v=20260704-1"></script>
  <script src="./src/features/theme-toggle/implementation.js?v=20260715-2"></script>
  <script src="./release-prep-loader.js?v=20260715-1"></script>
  <script src="./src/features/task-wording/implementation.js?v=20260707-2"></script>
  <script src="./src/features/desktop-task-control-guard/implementation.js?v=20260718-1"></script>
</body>
</html>
